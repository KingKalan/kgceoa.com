<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SANo GLB Viewer</title>

<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>
:root{
    --cyan:#38E8FF;
    --purple:#4F43AE;
    --white:#F5F7FF;
    --bg:#050511;
}

body{
    margin:0;
    background:var(--bg);
    color:var(--white);
    font-family:Arial, Helvetica, sans-serif;
}

header{
    text-align:center;
    padding:30px;
    border-bottom:3px solid var(--purple);
}

h1{
    margin:0;
    color:var(--cyan);
    font-size:3rem;
}

.subtitle{
    color:#cccccc;
    margin-top:10px;
}

.viewer-container{
    height:80vh;
    width:100%;
}

model-viewer{
    width:100%;
    height:100%;
    background:
        radial-gradient(circle at center,
        rgba(56,232,255,.15),
        rgba(79,67,174,.10),
        #050511);
}

.info{
    max-width:1000px;
    margin:auto;
    padding:30px;
}

.card{
    border:1px solid var(--purple);
    border-radius:12px;
    padding:20px;
    background:#0a0a18;
}

.card h2{
    color:var(--cyan);
    margin-top:0;
}
</style>
</head>

<body>

<header>
    <h1>SANo Development Model</h1>
    <div class="subtitle">
        Place shell.glb in the same directory as this file.
    </div>
</header>

<div class="viewer-container">
    <model-viewer
        src="shell.glb"
        alt="SANo Console Model"
        camera-controls
        auto-rotate
        shadow-intensity="1"
        exposure="1">
    </model-viewer>
</div>

<div class="info">
    <div class="card">
        <h2>Current Prototype</h2>
        <p>
            This viewer automatically loads <strong>shell.glb</strong>.
            Replace the file with newer revisions while keeping the same filename
            and the page will update automatically.
        </p>
    </div>
</div>

</body>
</html>
